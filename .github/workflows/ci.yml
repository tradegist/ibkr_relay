name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -r poller/requirements.txt -r remote-client/requirements.txt

      - name: Run unit tests
        run: PYTHONPATH=.:poller:remote-client python -m pytest -v

      - name: Run type checking
        run: |
          MYPYPATH=poller python -m mypy poller/ cli/test_webhook.py
          MYPYPATH=remote-client python -m mypy remote-client/
