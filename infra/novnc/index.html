    <!-- Stylesheets -->

    <style>
      /* Override noVNC defaults so Tailwind controls layout */
      #noVNC_status_bar {
        all: unset;
      }
    </style>

    <!-- promise polyfills promises for IE11 -->
    <script src="vendor/promise.js"></script>
    <!-- ES2015/ES6 modules polyfill -->
    <script type="module">
      window._noVNC_has_module_support = true;
    </script>
    <script>
      window.addEventListener("load", function () {
        if (window._noVNC_has_module_support) return;
        var loader = document.createElement("script");
        loader.src =
          "vendor/browser-es-module-loader/dist/browser-es-module-loader.js";
        document.head.appendChild(loader);
      });
    </script>

    <!-- actual script modules -->
    <script type="module" crossorigin="anonymous">
      // Load supporting scripts
      import * as WebUtil from "./app/webutil.js";
      import RFB from "./core/rfb.js";

      var rfb;
      var desktopName;

      function updateDesktopName(e) {
        desktopName = e.detail.name;
      }
      function credentials(e) {
        var form = document.createElement("form");
        form.className = "flex items-center justify-center gap-3";
        form.innerHTML =
          '<label class="text-yellow-300 font-semibold text-sm">Password Required:</label>' +
          '<input type="password" id="password_input" class="px-3 py-1.5 rounded bg-gray-800 border border-gray-600 text-white text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 w-48" />' +
          '<button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded cursor-pointer transition">Connect</button>';
        form.onsubmit = setPassword;

        // bypass status() because it sets text content
        document
          .getElementById("noVNC_status_bar")
          .setAttribute(
            "class",
            "fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 bg-yellow-900 text-white shadow-lg text-sm font-mono",
          );
        document.getElementById("noVNC_status").innerHTML = "";
        document.getElementById("noVNC_status").appendChild(form);
      }
      function setPassword() {
        rfb.sendCredentials({
          password: document.getElementById("password_input").value,
        });
        return false;
      }

      var STATUS_CLASSES = {
        normal:
          "fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 bg-gray-900 text-white shadow-lg text-sm font-mono",
        warn: "fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 bg-yellow-900 text-white shadow-lg text-sm font-mono",
        error:
          "fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 bg-red-900 text-white shadow-lg text-sm font-mono",
      };
      function status(text, level) {
        if (!STATUS_CLASSES[level]) level = "warn";
        document.getElementById("noVNC_status_bar").className =
          STATUS_CLASSES[level];
        document.getElementById("noVNC_status").textContent = text;
      }

      function connected(e) {
        if (
          WebUtil.getConfigVar("encrypt", window.location.protocol === "https:")
        ) {
          status("Connected (encrypted) to " + desktopName, "normal");
        } else {
          status("Connected (unencrypted) to " + desktopName, "normal");
        }
      }

      function disconnected(e) {
        if (e.detail.clean) {
          status("Disconnected", "normal");
        } else {
          showStartGateway();
        }
      }

      function showStartGateway() {
        var bar = document.getElementById("noVNC_status_bar");
        bar.className = STATUS_CLASSES["warn"];
        var statusEl = document.getElementById("noVNC_status");
        statusEl.innerHTML = "";

        var form = document.createElement("form");
        form.className = "flex items-center justify-center gap-3";
        form.innerHTML =
          '<span class="text-yellow-300 font-semibold text-sm">Gateway is not running.</span>' +
          '<input type="password" id="gateway_password" placeholder="VNC Password" class="px-3 py-1.5 rounded bg-gray-800 border border-gray-600 text-white text-sm focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 w-48" />' +
          '<button type="submit" id="startGatewayBtn" class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-semibold rounded cursor-pointer transition">Start Gateway</button>';
        form.onsubmit = function () {
          var pwd = document.getElementById("gateway_password").value;
          var btn = document.getElementById("startGatewayBtn");
          if (!pwd) return false;
          btn.disabled = true;
          btn.textContent = "Starting…";
          btn.className =
            "px-3 py-1.5 bg-gray-600 text-white text-xs font-semibold rounded opacity-60";
          fetch("/gateway/cgi-bin/start-gateway", { method: "POST" })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.status === "started") {
                status("Gateway started — connecting…", "normal");
                setTimeout(function () {
                  reconnect(pwd);
                }, 5000);
              } else {
                status("Failed to start: " + data.detail, "error");
              }
            })
            .catch(function () {
              status("Failed to reach gateway controller", "error");
            });
          return false;
        };
        statusEl.appendChild(form);
      }

      function reconnect(pwd) {
        if (rfb) {
          rfb.removeEventListener("connect", connected);
          rfb.removeEventListener("disconnect", disconnected);
          rfb.removeEventListener("credentialsrequired", credentials);
          rfb.removeEventListener("desktopname", updateDesktopName);
        }
        var encrypt = WebUtil.getConfigVar(
          "encrypt",
          window.location.protocol === "https:",
        );
        var url = (encrypt ? "wss" : "ws") + "://" + host;
        if (port) url += ":" + port;
        url += "/" + path;

        rfb = new RFB(document.body, url, {
          repeaterID: WebUtil.getConfigVar("repeaterID", ""),
          shared: WebUtil.getConfigVar("shared", true),
          credentials: { password: pwd },
        });
        rfb.viewOnly = WebUtil.getConfigVar("view_only", false);
        rfb.addEventListener("connect", connected);
        rfb.addEventListener("disconnect", disconnected);
        rfb.addEventListener("credentialsrequired", credentials);
        rfb.addEventListener("desktopname", updateDesktopName);
        rfb.scaleViewport = WebUtil.getConfigVar("scale", false);
        rfb.resizeSession = WebUtil.getConfigVar("resize", false);
      }

      WebUtil.init_logging(WebUtil.getConfigVar("logging", "warn"));
      document.title = WebUtil.getConfigVar("title", "noVNC");
      // By default, use the host and port of server that served this file
      var host = WebUtil.getConfigVar("host", window.location.hostname);
      var port = WebUtil.getConfigVar("port", window.location.port);

      // if port == 80 (or 443) then it won't be present and should be
      // set manually
      if (!port) {
        if (window.location.protocol.substring(0, 5) == "https") {
          port = 443;
        } else if (window.location.protocol.substring(0, 4) == "http") {
          port = 80;
        }
      }

      var password = WebUtil.getConfigVar("password", "");
      var path = WebUtil.getConfigVar("path", "websockify");

      // If a token variable is passed in, set the parameter in a cookie.
      // This is used by nova-novncproxy.
      var token = WebUtil.getConfigVar("token", null);
      if (token) {
        // if token is already present in the path we should use it
        path = WebUtil.injectParamIfMissing(path, "token", token);

        WebUtil.createCookie("token", token, 1);
      }

      (function () {
        status("Connecting", "normal");

        if (!host || !port) {
          status("Must specify host and port in URL", "error");
        }

        var url;

        if (
          WebUtil.getConfigVar("encrypt", window.location.protocol === "https:")
        ) {
          url = "wss";
        } else {
          url = "ws";
        }

        url += "://" + host;
        if (port) {
          url += ":" + port;
        }
        url += "/" + path;

        rfb = new RFB(document.body, url, {
          repeaterID: WebUtil.getConfigVar("repeaterID", ""),
          shared: WebUtil.getConfigVar("shared", true),
          credentials: { password: password },
        });
        rfb.viewOnly = WebUtil.getConfigVar("view_only", false);
        rfb.addEventListener("connect", connected);
        rfb.addEventListener("disconnect", disconnected);
        rfb.addEventListener("credentialsrequired", credentials);
        rfb.addEventListener("desktopname", updateDesktopName);
        rfb.scaleViewport = WebUtil.getConfigVar("scale", false);
        rfb.resizeSession = WebUtil.getConfigVar("resize", false);
      })();
    </script>

  <body>

      class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-2 bg-gray-900 text-white shadow-lg text-sm font-mono"
    >
      <div id="noVNC_left_dummy_elem"></div>
      <div id="noVNC_status" class="flex-1 text-center">Loading</div>
